<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        iframe { border: none; width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <iframe id="pyvis-iframe"></iframe>

    <script>
        var _registered = false;
        var _retryCount = 0;
        var _retryTimer = null;

        function sendToStreamlit(type, data) {
            window.parent.postMessage(Object.assign({isStreamlitMessage: true, type: type}, data), '*');
        }

        function tryRegister() {
            if (_registered) return;
            _retryCount++;
            sendToStreamlit('streamlit:componentReady', {apiVersion: 1});
            if (_retryCount < 50) {
                _retryTimer = setTimeout(tryRegister, 200);
            }
        }

        window.addEventListener('message', function(event) {
            if (!event.data) return;

            // Streamlit sends us arguments
            if (event.data.type === 'streamlit:render') {
                _registered = true;
                if (_retryTimer) clearTimeout(_retryTimer);

                // Set height after we are acknowledged
                sendToStreamlit('streamlit:setFrameHeight', {height: 640});

                var htmlData = event.data.args.html;
                if (htmlData) {
                    var iframe = document.getElementById('pyvis-iframe');
                    iframe.srcdoc = htmlData;
                }
            }

            // Pyvis iframe sends us a click event
            if (event.data.type === 'pyvis_click') {
                // Forward the clicked node ID back to Streamlit python
                sendToStreamlit('streamlit:setComponentValue', {value: event.data.node});
            }
        });

        // Start registration attempts
        tryRegister();
    </script>
</body>
</html>
